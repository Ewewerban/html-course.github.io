<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson 2 - Core Tags</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <header>
    <div class="logo-area">
      <h1>Lesson 2</h1>
    </div>
    <nav>
      <a href="../workspace.html" target="_blank" style="background: #ffeaa7;">🛠️ Open Workspace</a>
      <a href="all-lessons.html">📋 All lessons</a>
    </nav>
  </header>

  <main class="container">
    <div class="box">
      <h2>Basic Elements & Tags</h2>
      <p style="margin: 15px 0; line-height: 1.6;">
        HTML tags act like container brackets around texts. Headings (<code>&lt;h1&gt;</code> to <code>&lt;h6&gt;</code>) define structural topics, while paragraphs (<code>&lt;p&gt;</code>) hold regular text blocks.
      </p>
    </div>

    <div class="box" style="display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
      <span>Finished reading and experimenting?</span>
      <button id="finishBtn" class="btn" style="background: #fff;" onclick="markFinished()">Finish Lesson (mark Check) 🔘</button>
    </div>
  </main>

  <script>
    function markFinished() {
      localStorage.setItem("lesson-2-finished", "true");
      const btn = document.getElementById("finishBtn");
      btn.innerText = "Lesson Completed! ✔️";
      btn.style.backgroundColor = "#55efc4";
      btn.disabled = true;
    }

    document.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem("lesson-2-finished") === "true") {
        const btn = document.getElementById("finishBtn");
        btn.innerText = "Lesson Completed! ✔️";
        btn.style.backgroundColor = "#55efc4";
        btn.disabled = true;
      }
    });
  </script>

</body>
</html>
