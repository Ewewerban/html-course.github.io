<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Lessons - HTML For Beginners</title>
  <style>
    body {
      background-color: #fcfbf2;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #ff9f43;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 5px solid #000;
    }
    header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .box {
      background: #fff;
      border: 4px solid #000;
      border-radius: 12px;
      padding: 20px 30px;
      margin-bottom: 25px;
      box-shadow: 6px 6px 0px #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .lesson-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .lesson-icon {
      font-size: 35px;
    }
    .lesson-title {
      margin: 0;
      font-size: 22px;
      font-weight: bold;
    }
    .lesson-desc {
      margin: 5px 0 0 0;
      color: #555;
      font-size: 14px;
    }
    .actions-area {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .btn {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      text-decoration: none;
      color: #000;
      padding: 10px 20px;
      border: 3px solid #000;
      border-radius: 8px;
      box-shadow: 4px 4px 0px #000;
      background: #fff;
      cursor: pointer;
      font-size: 15px;
    }
    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #000;
    }
    .status-btn {
      min-width: 150px;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div><h1>📋 All Lessons</h1></div>
    <div><a href="../index.html" class="btn"> Strona Główna / Main Page 🏠</a></div>
  </header>

  <main class="container">
    <h2 style="margin-bottom: 30px; font-weight: bold; font-size: 24px;">Your Learning Track:</h2>

    <div class="box">
      <div class="lesson-info">
        <span class="lesson-icon">📄</span>
        <div>
          <h3 class="lesson-title">Lesson 1</h3>
          <p class="lesson-desc">Creating your first file and writing basic code.</p>
        </div>
      </div>
      <div class="actions-area">
        <a href="lesson1.html" class="btn">Enter Lesson</a>
        <button id="status-l1" class="btn status-btn" style="background: #ff7675;" onclick="toggleLesson(1)">❌ Unfinished</button>
      </div>
    </div>

    <div class="box">
      <div class="lesson-info">
        <span class="lesson-icon">🏷️</span>
        <div>
          <h3 class="lesson-title">Lesson 2</h3>
          <p class="lesson-desc">Essential structural HTML tags and their attributes.</p>
        </div>
      </div>
      <div class="actions-area">
        <a href="lesson2.html" class="btn">Enter Lesson</a>
        <button id="status-l2" class="btn status-btn" style="background: #ff7675;" onclick="toggleLesson(2)">❌ Unfinished</button>
      </div>
    </div>
  </main>

  <script>
    function toggleLesson(id) {
      const key = `lesson-${id}-finished`;
      const btn = document.getElementById(`status-l${id}`);
      if (localStorage.getItem(key) === "true") {
        localStorage.setItem(key, "false");
        btn.innerText = "❌ Unfinished";
        btn.style.backgroundColor = "#ff7675";
      } else {
        localStorage.setItem(key, "true");
        btn.innerText = "✔️ Finished";
        btn.style.backgroundColor = "#55efc4";
      }
    }

    function loadStatuses() {
      for (let id = 1; id <= 2; id++) {
        const btn = document.getElementById(`status-l${id}`);
        if (localStorage.getItem(`lesson-${id}-finished`) === "true") {
          btn.innerText = "✔️ Finished";
          btn.style.backgroundColor = "#55efc4";
        } else {
          btn.innerText = "❌ Unfinished";
          btn.style.backgroundColor = "#ff7675";
        }
      }
    }
    document.addEventListener("DOMContentLoaded", loadStatuses);
  </script>
</body>
</html>
