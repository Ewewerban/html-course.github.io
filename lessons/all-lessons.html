<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Lessons - HTML For Beginners</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <header>
    <div class="logo-area">
      <h1>📋 All Lessons</h1>
    </div>
    <nav>
      <a href="../index.html">🏠 Main Page</a>
    </nav>
  </header>

  <main class="container">
    <h2 style="margin-bottom: 25px; font-family: monospace;">Your Learning Track:</h2>

    <div style="display: flex; flex-direction: column; gap: 20px;">
      
      <div class="box" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <div style="display: flex; align-items: center; gap: 15px;">
          <span style="font-size: 30px;">📄</span>
          <div>
            <h3 style="font-size: 20px;">Lesson 1</h3>
            <p style="color: #555; margin-top: 4px;">Creating your first file and writing basic code.</p>
          </div>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
          <a href="lesson1.html" class="btn" style="background: #fff; text-decoration: none;">Enter Lesson</a>
          <span id="status-l1" class="btn" style="background: #ff7675; cursor: default; box-shadow: none; border-color: #000; color: #000;">❌ Unfinished</span>
        </div>
      </div>

      <div class="box" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <div style="display: flex; align-items: center; gap: 15px;">
          <span style="font-size: 30px;">🏷️</span>
          <div>
            <h3 style="font-size: 20px;">Lesson 2</h3>
            <p style="color: #555; margin-top: 4px;">Essential structural HTML tags and text elements.</p>
          </div>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
          <a href="lesson2.html" class="btn" style="background: #fff; text-decoration: none;">Enter Lesson</a>
          <span id="status-l2" class="btn" style="background: #ff7675; cursor: default; box-shadow: none; border-color: #000; color: #000;">❌ Unfinished</span>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Skrypt odczytujący stan z LocalStorage po załadowaniu strony spisu
    document.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem("lesson-1-finished") === "true") {
        const badge1 = document.getElementById("status-l1");
        badge1.innerText = "✔️ Finished";
        badge1.style.backgroundColor = "#55efc4";
      }
      if (localStorage.getItem("lesson-2-finished") === "true") {
        const badge2 = document.getElementById("status-l2");
        badge2.innerText = "✔️ Finished";
        badge2.style.backgroundColor = "#55efc4";
      }
    });
  </script>

</body>
</html>
