<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Lessons</title>
  <style>
    /* Zachowujemy Twój unikalny styl rysunkowy retro-cartoon z grubymi obramowaniami */
    body {
      background-color: #fcfbf2;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #ff9f43;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 5px solid #000;
    }
    header h1 {
      margin: 0;
      font-size: 24px;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .box {
      background: #fff;
      border: 4px solid #000;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 6px 6px 0px #000;
    }
    .btn {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      text-decoration: none;
      color: #000;
      padding: 8px 16px;
      border: 3px solid #000;
      border-radius: 8px;
      box-shadow: 3px 3px 0px #000;
      cursor: pointer;
      transition: all 0.1s ease;
    }
    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px #000;
    }
    .status-btn {
      min-width: 140px;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>📋 All Lessons</h1>
    </div>
    <div style="display: flex; gap: 10px;">
      <a href="../index.html" class="btn" style="background: #fff;">🏠 Main Page</a>
    </div>
  </header>

  <main class="container">
    <h2 style="margin-bottom: 25px; font-weight: bold;">Your Learning Track:</h2>

    <div class="box" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
      <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 35px;">📄</span>
        <div>
          <h3 style="margin: 0; font-size: 20px;">Lesson 1</h3>
          <p style="margin: 5px 0 0 0; color: #555;">Creating your first file and writing basic code.</p>
        </div>
      </div>
      <div style="display: flex; gap: 15px; align-items: center;">
        <a href="lesson1.html" class="btn" style="background: #fff;">Enter Lesson</a>
        <button id="status-l1" class="btn status-btn" style="background: #ff7675;" onclick="toggleLesson(1)">❌ Unfinished</button>
      </div>
    </div>

    <div class="box" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
      <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 35px;">🏷️</span>
        <div>
          <h3 style="margin: 0; font-size: 20px;">Lesson 2</h3>
          <p style="margin: 5px 0 0 0; color: #555;">Essential structural HTML tags and their attributes.</p>
        </div>
      </div>
      <div style="display: flex; gap: 15px; align-items: center;">
        <a href="lesson2.html" class="btn" style="background: #fff;">Enter Lesson</a>
        <button id="status-l2" class="btn status-btn" style="background: #ff7675;" onclick="toggleLesson(2)">❌ Unfinished</button>
      </div>
    </div>
  </main>

  <script>
    // Funkcja wywoływana przy kliknięciu przycisku statusu na liście
    function toggleLesson(id) {
      const storageKey = `lesson-${id}-finished`;
      const button = document.getElementById(`status-l` + id);
      
      // Sprawdzamy aktualny stan i przełączamy na odwrót (odklikiwanie!)
      if (localStorage.getItem(storageKey) === "true") {
        // Jeśli było ukończone -> ustawiamy na nieukończone
        localStorage.setItem(storageKey, "false");
        button.innerText = "❌ Unfinished";
        button.style.backgroundColor = "#ff7675";
      } else {
        // Jeśli było nieukończone -> ustawiamy na ukończone
        localStorage.setItem(storageKey, "true");
        button.innerText = "✔️ Finished";
        button.style.backgroundColor = "#55efc4";
      }
    }

    // Funkcja ładująca stany z pamięci przy uruchomieniu strony
    function updateButtonsOnLoad() {
      for (let id = 1; id <= 2; id++) {
        const button = document.getElementById(`status-l` + id);
        if (localStorage.getItem(`lesson-${id}-finished`) === "true") {
          button.innerText = "✔️ Finished";
          button.style.backgroundColor = "#55efc4";
        } else {
          button.innerText = "❌ Unfinished";
          button.style.backgroundColor = "#ff7675";
        }
      }
    }

    // Uruchomienie sprawdzania po załadowaniu dokumentu
    document.addEventListener("DOMContentLoaded", updateButtonsOnLoad);
  </script>

</body>
</html>
