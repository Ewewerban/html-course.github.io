<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace - Live HTML Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo-area">
      <h1>🛠️ Live Workspace</h1>
    </div>
    <nav style="display: flex; gap: 10px;">
      <a href="codebook.html" style="background: #ffeaa7;">📖 Code Book</a>
      <a href="index.html">Main page ➔</a>
    </nav>
  </header>

  <main class="container">
    
    <div class="workspace-grid">
      
      <div class="panel">
        <div class="panel-header">
          <span>📝 index.html</span>
          <button class="btn" style="padding: 2px 8px; font-size: 12px; box-shadow: none;" onclick="clearWorkspace()">❌ Clean</button>
        </div>
        <textarea id="codeEditor" class="workspace-textarea" placeholder="Write your HTML code here..." oninput="updatePreview()"><!DOCTYPE html>
<html>
  <head>
    <title>My Sandbox</title>
  </head>
  <body>
    <h1>Hello World! 🎉</h1>
    <p>Start editing this file to see live changes on the right.</p>
  </body>
</html></textarea>
      </div>

      <div class="panel">
        <div class="browser-bar">
          <div class="browser-dots">
            <div class="browser-dot red"></div>
            <div class="browser-dot yellow"></div>
            <div class="browser-dot green"></div>
          </div>
          <div class="browser-address">localhost:3000/workspace.html</div>
        </div>
        <iframe id="livePreview" class="preview-iframe"></iframe>
      </div>

    </div>

    <div style="text-align: center; margin-top: 20px;">
      <button class="btn" style="font-size: 16px; background: #d4edda; padding: 12px 24px;" onclick="downloadHTML()">
        📥 Download index.html
      </button>
    </div>

  </main>

  <script>
    const editor = document.getElementById('codeEditor');
    const preview = document.getElementById('livePreview');

    function updatePreview() {
      const code = editor.value;
      const previewDocument = preview.contentDocument || preview.contentWindow.document;
      previewDocument.open();
      previewDocument.write(code);
      previewDocument.close();
      localStorage.setItem('workspace-code', code);
    }

    function clearWorkspace() {
      if(confirm("Clear all your current code?")) {
        editor.value = "";
        updatePreview();
      }
    }

    function downloadHTML() {
      const code = editor.value;
      const blob = new Blob([code], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const savedCode = localStorage.getItem('workspace-code');
      if (savedCode !== null) {
        editor.value = savedCode;
      }
      updatePreview();
    });
  </script>

</body>
</html>
